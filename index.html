<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dead Hand: 3D Capsa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-layer">
        <div class="overlay"></div>
        <div class="content">
            <h1 class="glitch">DEAD HAND</h1>
            <p class="subtitle">3D CAPSA ROULETTE</p>
            
            <div id="main-menu" class="menu-group">
                <button class="btn-main" onclick="showHostMenu()">BUAT RUANGAN</button>
                <button class="btn-main" onclick="showJoinMenu()">GABUNG RUANGAN</button>
                <button class="btn-sub" onclick="playSolo()">MAIN OFFLINE</button>
            </div>

            <div id="host-menu" class="menu-group" style="display:none;">
                <p>KODE ROOM ANDA:</p>
                <div id="generatedCode" class="code-display">----</div>
                <button class="btn-main" onclick="startHost()">MULAI GAME</button>
                <button class="btn-back" onclick="backToMenu()">KEMBALI</button>
            </div>

            <div id="join-menu" class="menu-group" style="display:none;">
                <input type="number" id="roomInput" placeholder="KODE 4-ANGKA">
                <button class="btn-main" onclick="joinGame()">MASUK MEJA</button>
                <button class="btn-back" onclick="backToMenu()">KEMBALI</button>
            </div>
            
            <p id="status">Siapkan mentalmu...</p>
        </div>
    </div>

    <div id="game-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
