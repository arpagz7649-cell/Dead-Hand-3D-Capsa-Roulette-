<div id="ui-layer">
    <h1>DEAD HAND</h1>
    <p>3D Capsa Roulette</p>
    
    <div id="main-menu" class="menu-box">
        <button onclick="showHostMenu()">BUAT RUANGAN (HOST)</button>
        <button onclick="showJoinMenu()">GABUNG RUANGAN (JOIN)</button>
        <button onclick="playSolo()">MAIN SENDIRI (OFFLINE)</button>
    </div>

    <div id="host-menu" class="menu-box" style="display:none;">
        <p>KODE RUANGAN ANDA:</p>
        <h2 id="generatedCode">----</h2>
        <button onclick="startHost()">MULAI PERMAINAN</button>
        <button onclick="backToMenu()" style="background: #444;">BATAL</button>
    </div>

    <div id="join-menu" class="menu-box" style="display:none;">
        <input type="text" id="roomInput" placeholder="MASUKKAN KODE...">
        <button onclick="joinGame()">MASUK MEJA</button>
        <button onclick="backToMenu()" style="background: #444;">BATAL</button>
    </div>
    
    <div id="status">Siapkan mentalmu...</div>
</div>
